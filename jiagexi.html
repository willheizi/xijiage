<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>双南囍 - 双南液臻酿系列</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            line-height: 1.2;
            padding: 20px; /* 页面内边距，避免内容贴边 */
        }
        /* 整体容器：居中展示，限制最大宽度 */
        .main-container {
            max-width: 800px; /* 限制最大宽度，视频非全屏 */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 视频和文字区间距 */
        }
        /* 视频区域：非全屏，固定比例 */
        .video-wrapper {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9比例，保持视频比例 */
            position: relative;
            background-color: #000;
            border-radius: 4px;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 调整：双南囍酒图样式（已去掉阴影） */
        .wine-image {
            width: 100%;
            max-width: 320px; /* 从400px缩小为320px，更贴合页面比例 */
            margin: 20px auto; /* 上下间距+水平居中 */
            display: block;
            border-radius: 4px;
            /* 已删除 box-shadow 阴影代码 */
        }

        /* 文字信息区域：还原效果图排版 */
        .info-section {
            background-color: #1a1a1a;
            text-align: center;
            padding: 20px 0;
        }
        /* 品牌名称：带下划线，居中 */
        .brand-name {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            display: inline-block; /* 下划线仅适配文字宽度 */
        }
        /* 下划线：仅在文字下方，与效果图一致 */
        .brand-name::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #ffffff;
        }
        /* 产品描述：小号字体，灰色 */
        .product-desc {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #cccccc;
            margin-bottom: 25px;
        }
        /* 价格区域：精准还原位置 */
        .price-box {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
        }
        /* 价格数字：超大号粗体 */
        .price-num {
            font-size: clamp(4rem, 15vw, 6rem);
            font-weight: 700;
            line-height: 1;
        }
        /* 零售价标签：金色背景，小号字体 */
        .retail-tag {
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            color: #000;
            background-color: #ffd700; /* 金色背景，与效果图一致 */
            padding: 2px 6px;
            border-radius: 2px;
            margin-bottom: 18px; /* 对齐价格数字底部 */
        }
        /* 货币单位：小号灰色 */
        .currency {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            color: #cccccc;
            margin-bottom: 8px;
        }

        /* 产品标签区域（无黄色边框和顶部黄线） */
        .product-label {
            max-width: 800px;
            margin: 20px auto 0;
            padding: 30px;
            background-color: #1a1a1a;
            font-family: "Microsoft Yahei", serif;
        }
        /* 标签内容：单列布局（匹配图片排版顺序），金色文字 */
        .label-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            color: #d4af37; /* 金色文字，匹配标签 */
            font-size: clamp(1rem, 3vw, 1.3rem);
            line-height: 1.8;
        }
        .label-item {
            display: flex;
            flex-wrap: wrap;
        }
        .label-item strong {
            min-width: 140px;
            font-weight: 500;
        }

        /* 手机端微调 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .price-box {
                gap: 5px;
            }
            .retail-tag {
                margin-bottom: 15px;
            }
            .product-label {
                padding: 20px;
            }
            .label-item strong {
                min-width: 120px;
            }
            /* 手机端同步缩小酒图尺寸 */
            .wine-image {
                max-width: 240px;
                margin: 15px auto;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 视频区域（非全屏，替换为你的视频地址） -->
        <div class="video-wrapper">
            <iframe 
                src="https://willheizi.github.io/shuangnanye-video2/video2.html" 
                allowfullscreen="true"
                allow="autoplay; fullscreen; picture-in-picture"
                scrolling="no"
            ></iframe>
        </div>

        <!-- 双南囍酒图（视频与价格之间，已按比例缩小+无阴影） -->
        <img 
            class="wine-image"
            src="https://raw.githubusercontent.com/willheizi/xijiage/30841bf747727acd048e3d97967cac85845b1d98/shuangxi.png"
            alt="双南囍白酒"
        >

        <!-- 文字信息区域（替换为双南囍 368元内容） -->
        <div class="info-section">
            <h1 class="brand-name">双南囍</h1>
            <p class="product-desc">双南液臻酿系列 42°浓香型白酒</p>
            <div class="price-box">
                <span class="price-num">368</span>
                <span class="retail-tag">零售价</span>
                <span class="currency">RMB</span>
            </div>
        </div>

        <!-- 产品标签信息（替换为图片中的内容，单列布局） -->
        <div class="product-label">
            <div class="label-content">
                <div class="label-item">
                    <strong>[食品名称]</strong> 双南囍
                </div>
                <div class="label-item">
                    <strong>[香　　型]</strong> 浓香型白酒
                </div>
                <div class="label-item">
                    <strong>[产品类型]</strong> 固态法白酒
                </div>
                <div class="label-item">
                    <strong>[酒精度]</strong> 42%vol
                </div>
                <div class="label-item">
                    <strong>[净含量]</strong> 500ml
                </div>
                <div class="label-item">
                    <strong>[生产日期]</strong> 见标签喷码处
                </div>
                <div class="label-item">
                    <strong>[产品标准号]</strong> GB/T10781.1-2021(优级)
                </div>
                <div class="label-item">
                    <strong>[配　　料]</strong> 水、高粱、大米、糯米、小麦、玉米
                </div>
                <div class="label-item">
                    <strong>[食品生产许可证号]</strong> SC11551068350987
                </div>
                <div class="label-item">
                    <strong>[贮藏条件]</strong> 常温、阴凉、通风、干燥处保存
                </div>
                <div class="label-item">
                    <strong>[生产单位]</strong> 四川绵竹双南液酒业有限公司
                </div>
                <div class="label-item">
                    <strong>[厂　　址]</strong> 四川省绵竹市新市镇
                </div>
                <div class="label-item">
                    <strong>[产　　地]</strong> 四川省德阳市
                </div>
                <div class="label-item">
                    <strong>[电　　话]</strong> 400-0900078
                </div>
            </div>
        </div>
    </div>
</body>
</html>
